# See https://pre-commit.com for more information
repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: mixed-line-ending

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # YAML validation
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.0
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint"]

  # Ensure ansible-vault files are never committed/pushed unencrypted (public repo!)
  - repo: local
    hooks:
      - id: check-vault-encrypted
        name: Ensure ansible-vault files are encrypted
        entry: scripts/check-vault-encrypted.sh
        language: script
        files: ^inventory/group_vars/all\.yaml$
        stages: [pre-commit, pre-push]
